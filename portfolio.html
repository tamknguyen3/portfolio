<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway&display=swap" rel="stylesheet">
    <title>Tam's Personal Portfolio</title>

    <style>
      * {
        font-family: 'Raleway', sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      section {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: rgb(157, 197, 130);
        padding: 15px;
      }
      
      nav.navigation {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      nav.navigation a {
        color: white;
        font-size: 16px;
        text-decoration: none;
        padding: 10px;
      }

      nav.navigation a::after {
        content: '';
        width: 0;
        height: 2px;
        display: block;
        background-color: white;
      }
      
      nav.navigation a:hover::after {
        width: 100%;
        height: 2px;
        display: block;
        background-color: white;
        transition: 0.5s;
      }

      
    </style>
  </head>
  <body>
    <section>
      <div class="logo">
        <a href="#"><img src="logos-icons/matcha-latte.png"></a>
      </div>
      <nav class="navigation">
        <a href="#">Home</a>
        <a href="#">Education</a>
        <a href="#">Experience</a>
        <a href="#">Projects</a>
        <a href="#">Hobbies</a>
        <a href="#">Gallery</a>
      </nav>
    </section>
  </body>
</html>
